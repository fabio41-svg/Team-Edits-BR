<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEAM EDITS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;
}

#bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-10;
    background:black;
}

.overlay{
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top, rgba(255,0,0,0.08), rgba(0,0,0,0.85));
    z-index:-5;
}

.card{
    position:relative;
    width:90%;
    max-width:420px;
    padding:40px 25px;
    border-radius:35px;
    background:rgba(15,15,15,0.82);
    text-align:center;
    border:2px solid rgba(255,0,0,0.35);
    box-shadow:0 0 15px rgba(255,0,0,0.4),0 0 35px rgba(255,0,0,0.25);
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:35px;
    padding:2px;
    background:linear-gradient(45deg,darkred,red,#ff2a2a,darkred);
    background-size:300%;
    animation:borderMove 5s linear infinite;
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
}

@keyframes borderMove{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
}

.logo{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid red;
    box-shadow:0 0 15px red,0 0 35px darkred;
    margin-bottom:25px;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card h1{
    color:white;
    font-size:52px;
    letter-spacing:4px;
    margin-bottom:15px;
    text-shadow:0 0 8px red,0 0 20px red;
}

.card p{
    color:#d4d4d4;
    font-size:17px;
    line-height:1.7;
    margin-bottom:35px;
}

.login-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:22px;
    background:linear-gradient(45deg,darkred,red,#ff1a1a);
    color:white;
    font-size:24px;
    font-weight:900;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 0 12px red,0 0 30px rgba(255,0,0,0.45);
}

.login-btn:hover{
    transform:scale(1.03);
}

.bottom-text{
    margin-top:25px;
    color:#9e9e9e;
    font-size:13px;
}

@media(max-width:500px){
    .card h1{font-size:42px;}
    .login-btn{font-size:20px;}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="overlay"></div>

<div class="card">

    <div class="logo">
        <img src="br-logo.png">
    </div>

    <h1>TEAM</h1>

    <p>Painel oficial da equipe. Sistema premium com acesso exclusivo.</p>

    <button class="login-btn" id="loginBtn" onclick="alert('JS FUNCIONANDO')">
        Login Google
    </button>

    <div class="bottom-text">© TEAM EDITS</div>

</div>

<script type="module" src="https://fabio41-svg.github.io/Team-Edits-BR/script.js"></script>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const petals = [];

for(let i=0;i<35;i++){
    petals.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*5+3,
        speedY:Math.random()*1+0.5,
        speedX:Math.random()*0.8-0.4,
        angle:Math.random()*Math.PI
    });
}

function drawTree(){
    ctx.strokeStyle="#140000";
    ctx.lineWidth=18;
    ctx.shadowBlur=20;
    ctx.shadowColor="rgba(255,0,0,0.2)";

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,canvas.height);
    ctx.lineTo(canvas.width/2,canvas.height-300);
    ctx.stroke();

    for(let i=0;i<7;i++){
        ctx.beginPath();
        ctx.moveTo(canvas.width/2,canvas.height-300);
        ctx.lineTo(
            canvas.width/2+(Math.random()*300-150),
            canvas.height-500+(Math.random()*120)
        );
        ctx.stroke();
    }
}

function drawPetals(){
    petals.forEach(p=>{
        ctx.beginPath();
        ctx.fillStyle="rgba(255,0,70,0.95)";
        ctx.shadowColor="red";
        ctx.shadowBlur=10;

        ctx.ellipse(p.x,p.y,p.size,p.size/2,p.angle,0,Math.PI*2);
        ctx.fill();

        p.y+=p.speedY;
        p.x+=p.speedX;

        if(p.y>canvas.height){
            p.y=-20;
            p.x=Math.random()*canvas.width;
        }
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawTree();
    drawPetals();
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
